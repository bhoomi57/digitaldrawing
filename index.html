<!DOCTYPE html>
<html>
<head>
    <title>Rock Paper Scissors vs AI</title>

    <style>
        body{
            text-align:center;
            font-family:Arial;
            background:#f4f4f4;
        }

        h1{
            color:#333;
        }

        button{
            padding:15px 25px;
            margin:10px;
            font-size:18px;
            cursor:pointer;
        }

        .scoreboard{
            margin-top:20px;
            font-size:22px;
        }

        #result{
            margin-top:20px;
            font-size:24px;
            font-weight:bold;
        }
    </style>
</head>
<body>

<h1>Rock Paper Scissors (vs AI)</h1>

<button onclick="play('Rock')">🪨 Rock</button>
<button onclick="play('Paper')">📄 Paper</button>
<button onclick="play('Scissors')">✂️ Scissors</button>

<div id="result"></div>

<div class="scoreboard">
    <p>Player Score: <span id="playerScore">0</span></p>
    <p>AI Score: <span id="aiScore">0</span></p>
</div>

<script>

let playerScore = 0;
let aiScore = 0;

function play(playerChoice){

    const choices = ["Rock","Paper","Scissors"];

    const aiChoice =
        choices[Math.floor(Math.random()*3)];

    let result = "";

    if(playerChoice === aiChoice){
        result = "It's a Draw!";
    }
    else if(
        (playerChoice === "Rock" && aiChoice === "Scissors") ||
        (playerChoice === "Paper" && aiChoice === "Rock") ||
        (playerChoice === "Scissors" && aiChoice === "Paper")
    ){
        result = "You Win!";
        playerScore++;
    }
    else{
        result = "AI Wins!";
        aiScore++;
    }

    document.getElementById("result").innerHTML =
        `You: ${playerChoice}<br>
         AI: ${aiChoice}<br>
         ${result}`;

    document.getElementById("playerScore").textContent =
        playerScore;

    document.getElementById("aiScore").textContent =
        aiScore;
}

</script>

</body>
</html>
